<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rania | Under Construction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Keyframe Animations since we are using a single file */
        @keyframes custom-spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes custom-spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }
        .animate-spin-slow {
            animation: custom-spin-slow 3s linear infinite;
        }
        .animate-spin-reverse {
            animation: custom-spin-reverse 2s linear infinite;
        }
    </style>
</head>
<body class="bg-neutral-950 text-white antialiased min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 font-sans overflow-hidden relative">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-500/10 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="z-10 flex flex-col items-center text-center max-w-2xl mx-auto border border-white/5 bg-white/5 backdrop-blur-md p-10 sm:p-16 rounded-3xl shadow-2xl">
        
        <div class="relative w-24 h-24 mb-10 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-indigo-500 animate-spin-slow"></div>
            <div class="absolute inset-2 rounded-full border-b-2 border-l-2 border-sky-400 animate-spin-reverse"></div>
            <div class="w-4 h-4 bg-white rounded-full animate-pulse shadow-[0_0_15px_rgba(255,255,255,0.8)]"></div>
        </div>

        <h1 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 mb-4 tracking-tight">
            Building Something Special
        </h1>
        
        <p class="text-base sm:text-lg text-gray-400 mb-8 max-w-md mx-auto leading-relaxed">
            Rania's new digital space is currently under construction. Check back soon for the official launch.
        </p>

        <div class="flex items-center space-x-3 bg-neutral-900/80 rounded-full px-5 py-2.5 border border-white/10">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
            </span>
            <span class="text-sm font-medium text-gray-300 tracking-wide uppercase">
                Systems deploying
            </span>
        </div>

    </div>

</body>
</html>
